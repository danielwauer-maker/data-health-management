services:
  backend:
    build: ./backend
    container_name: dhm-dev-backend
    restart: unless-stopped

    env_file:
      - .env.dev

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "127.0.0.1:8001:8000"

  postgres:
    image: postgres:15
    container_name: dhm-dev-postgres
    restart: unless-stopped

    env_file:
      - .env.dev

    volumes:
      - dhm_dev_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dhm_dev_postgres_data:
