name: Deploy to Hetzner

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main'
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd /home/daniel/data-health-management

            echo "📥 Clean sync PROD"
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "🐳 Start database only (PROD)"
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres

            echo "🧱 Run migrations (PROD)"
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm backend alembic upgrade head

            echo "🚀 Start full stack (PROD)"
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
          EOF

      - name: Health check PROD
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔎 Waiting for PROD health endpoint..."
          for i in {1..20}; do
            if curl -fsS https://api.bcsentinel.com/health; then
              echo "✅ PROD health check passed"
              exit 0
            fi
            echo "⏳ PROD not ready yet... attempt $i/20"
            sleep 5
          done
          echo "❌ PROD health check failed"
          exit 1

      - name: Deploy to DEV
        if: github.ref == 'refs/heads/staging'
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd /home/daniel/data-health-management-dev

            echo "📥 Clean sync DEV"
            git fetch origin
            git reset --hard origin/staging
            git clean -fd

            echo "🐳 Start database only (DEV)"
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d postgres

            echo "🧱 Run migrations (DEV)"
            docker compose -f docker-compose.dev.yml --env-file .env.dev run --rm backend alembic upgrade head

            echo "🚀 Start full stack (DEV)"
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build
          EOF

      - name: Health check DEV
        if: github.ref == 'refs/heads/staging'
        run: |
          echo "🔎 Waiting for DEV health endpoint..."
          for i in {1..20}; do
            if curl -fsS https://dev-api.bcsentinel.com/health; then
              echo "✅ DEV health check passed"
              exit 0
            fi
            echo "⏳ DEV not ready yet... attempt $i/20"
            sleep 5
          done
          echo "❌ DEV health check failed"
          exit 1