<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Registration | BCSentinel</title>
  <meta name="theme-color" content="#08111f" />
  <style>
    :root {
      --bg: #08111f;
      --card: rgba(14, 26, 51, 0.82);
      --line: rgba(255,255,255,.1);
      --text: #eff4ff;
      --muted: #acbbd8;
      --orange: #ff8f3d;
      --shadow: 0 24px 80px rgba(0,0,0,.34);
      --radius: 16px;
      --max: 900px;
    }
    html[data-theme="light"] {
      --bg: #f4f8ff;
      --card: rgba(255,255,255,.95);
      --line: rgba(12,33,66,.1);
      --text: #10213d;
      --muted: #566787;
      --shadow: 0 24px 70px rgba(21,43,82,.12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
    a { color: inherit; }
    .container { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; }
    .topbar { min-height: 78px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .actions { display:flex; gap:8px; }
    .btn {
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 999px;
      min-height: 40px;
      padding: 0 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .panel {
      margin: 20px 0 60px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 26px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.8rem, 4vw, 2.4rem); letter-spacing: -.03em; }
    .lead { margin: 0 0 18px; color: var(--muted); }
    .grid { display:grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    label { display:grid; gap:6px; color: var(--muted); font-size: .92rem; }
    input, textarea {
      border-radius: 12px;
      border:1px solid var(--line);
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    .checkbox { display:flex; gap:10px; align-items:flex-start; color: var(--muted); margin-top: 4px; }
    .submit {
      margin-top: 10px;
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--orange);
      background: linear-gradient(135deg, var(--orange), #ff7618);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
    }
    .status { display:none; margin-top:12px; padding:12px; border-radius:12px; }
    .status.show { display:block; }
    .status.error { background: rgba(226,87,76,.16); border:1px solid rgba(226,87,76,.32); }
    .status.success { background: rgba(20,184,133,.14); border:1px solid rgba(20,184,133,.3); }
  </style>
</head>
<body>
  <header class="container topbar">
    <a href="index.html"><strong>BCSentinel Partner</strong></a>
    <div class="actions">
      <button class="btn" data-set-lang="de">DE</button>
      <button class="btn" data-set-lang="en">EN</button>
      <button class="btn" data-toggle-theme>Theme</button>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h1 data-i18n="title">Partner registration</h1>
      <p class="lead" data-i18n="sub">Apply as a BCSentinel partner. We review your request and contact you shortly.</p>
      <form id="partnerRegisterForm" novalidate>
        <div class="grid">
          <label>
            <span data-i18n="company_name">Company name *</span>
            <input id="company_name" required />
          </label>
          <label>
            <span data-i18n="contact_name">Contact person *</span>
            <input id="contact_name" required />
          </label>
          <label>
            <span data-i18n="email">Business email *</span>
            <input id="email" type="email" required />
          </label>
          <label>
            <span data-i18n="phone">Phone</span>
            <input id="phone" />
          </label>
          <label>
            <span data-i18n="website">Website</span>
            <input id="website" placeholder="https://..." />
          </label>
          <label>
            <span data-i18n="country">Country</span>
            <input id="country" />
          </label>
        </div>
        <label style="margin-top:12px;">
          <span data-i18n="message">Short message</span>
          <textarea id="message"></textarea>
        </label>
        <label class="checkbox">
          <input id="consent" type="checkbox" />
          <span data-i18n="consent">I agree that my data is processed for partner onboarding and contact purposes.</span>
        </label>
        <button class="submit" type="submit" data-i18n="submit">Send registration</button>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <p class="lead" style="margin-top:14px;"><a href="partner-login.html" data-i18n="login_link">Already a partner? Go to login.</a></p>
    </section>
  </main>

  <script src="partner-api.js"></script>
  <script>
    const LANG_KEY = "bcsentinel-lang";
    const THEME_KEY = "bcsentinel-theme";
    const html = document.documentElement;
    const tr = {
      de: {
        title: "Partner-Registrierung",
        sub: "Bewirb dich als BCSentinel-Partner. Wir pruefen deine Anfrage und melden uns zeitnah.",
        company_name: "Firmenname *",
        contact_name: "Ansprechpartner *",
        email: "Business-E-Mail *",
        phone: "Telefon",
        website: "Website",
        country: "Land",
        message: "Kurze Nachricht",
        consent: "Ich stimme zu, dass meine Daten fuer Partner-Onboarding und Kontakt verarbeitet werden.",
        submit: "Registrierung senden",
        login_link: "Bereits Partner? Zum Login.",
        missing: "Bitte alle Pflichtfelder ausfuellen und Einwilligung bestaetigen.",
        success: "Danke! Deine Partner-Registrierung wurde uebermittelt.",
        failed: "Registrierung fehlgeschlagen. Bitte spaeter erneut versuchen."
      },
      en: {
        title: "Partner registration",
        sub: "Apply as a BCSentinel partner. We review your request and contact you shortly.",
        company_name: "Company name *",
        contact_name: "Contact person *",
        email: "Business email *",
        phone: "Phone",
        website: "Website",
        country: "Country",
        message: "Short message",
        consent: "I agree that my data is processed for partner onboarding and contact purposes.",
        submit: "Send registration",
        login_link: "Already a partner? Go to login.",
        missing: "Please complete required fields and accept consent.",
        success: "Thank you! Your partner registration has been submitted.",
        failed: "Registration failed. Please try again later."
      }
    };
    function lang() {
      const saved = localStorage.getItem(LANG_KEY);
      return saved === "en" ? "en" : "de";
    }
    function t(key) { return tr[lang()][key] || key; }
    function applyI18n() {
      html.lang = lang();
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (tr[lang()][key]) el.textContent = tr[lang()][key];
      });
    }
    function setTheme(theme) {
      const selected = theme === "light" ? "light" : "dark";
      html.setAttribute("data-theme", selected);
      localStorage.setItem(THEME_KEY, selected);
    }
    function setStatus(type, message) {
      const box = document.getElementById("status");
      box.className = "status show " + type;
      box.textContent = message;
    }
    document.addEventListener("click", (event) => {
      const langBtn = event.target.closest("[data-set-lang]");
      if (langBtn) {
        localStorage.setItem(LANG_KEY, langBtn.getAttribute("data-set-lang"));
        applyI18n();
      }
      if (event.target.closest("[data-toggle-theme]")) {
        const current = html.getAttribute("data-theme") === "light" ? "light" : "dark";
        setTheme(current === "light" ? "dark" : "light");
      }
    });
    document.getElementById("partnerRegisterForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        company_name: document.getElementById("company_name").value.trim(),
        contact_name: document.getElementById("contact_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        website: document.getElementById("website").value.trim(),
        country: document.getElementById("country").value.trim(),
        message: document.getElementById("message").value.trim(),
        source_page: window.location.pathname,
        consent_privacy: document.getElementById("consent").checked
      };
      if (!payload.company_name || !payload.contact_name || !payload.email || !payload.consent_privacy) {
        setStatus("error", t("missing"));
        return;
      }
      try {
        const res = await fetch(window.BCSentinelPartnerApi.buildUrl("/api/partners/register"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("failed");
        setStatus("success", t("success"));
        event.target.reset();
      } catch (_) {
        setStatus("error", t("failed"));
      }
    });
    setTheme(localStorage.getItem(THEME_KEY) || "dark");
    applyI18n();
  </script>
</body>
</html>
