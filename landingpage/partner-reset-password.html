<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner password reset | BCSentinel</title>
  <meta name="theme-color" content="#08111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('bcsentinel-theme');
        if (theme !== 'light' && theme !== 'dark') theme = 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    :root{--bg:#08111f;--card:rgba(14,26,51,.82);--line:rgba(255,255,255,.1);--text:#eff4ff;--muted:#acbbd8;--orange:#ff8f3d;--shadow:0 24px 80px rgba(0,0,0,.34);--surface:rgba(255,255,255,.03);--brand-border:rgba(255,255,255,.08)}
    html[data-theme="light"]{--bg:#f4f8ff;--card:rgba(255,255,255,.95);--line:rgba(12,33,66,.1);--text:#10213d;--muted:#566787;--shadow:0 24px 70px rgba(21,43,82,.12);--surface:rgba(16,33,61,.03);--brand-border:rgba(12,33,66,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}a{color:inherit;text-decoration:none}.container{width:min(calc(100% - 32px), 820px);margin:0 auto}
    .topbar{min-height:78px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:999px;min-height:40px;padding:0 12px;font-weight:700;cursor:pointer}
    .panel{margin:24px 0 60px;border:1px solid var(--line);border-radius:22px;background:var(--card);box-shadow:var(--shadow);padding:26px}.panel h1{margin:0 0 8px;font-size:clamp(1.8rem,4vw,2.5rem);letter-spacing:-.03em}.muted{color:var(--muted)}
    form{display:grid;gap:12px;margin-top:18px}label{display:grid;gap:6px;font-size:.92rem;color:var(--muted)}input{min-height:46px;border:1px solid var(--line);border-radius:12px;padding:0 12px;background:var(--surface);color:var(--text);font:inherit}button.submit{min-height:46px;border-radius:12px;border:1px solid var(--orange);background:linear-gradient(135deg,var(--orange),#ff7618);color:#fff;font-weight:800;cursor:pointer}.status{display:none;margin-top:12px;padding:12px;border-radius:12px}.status.show{display:block}.status.error{background:rgba(226,87,76,.16);border:1px solid rgba(226,87,76,.32)}.status.success{background:rgba(20,184,133,.14);border:1px solid rgba(20,184,133,.3)}
  </style>
</head>
<body>
  <header class="container topbar">
    <a class="brand" href="index.html">BCSentinel Partner</a>
    <div class="actions">
      <button class="btn" data-set-lang="de">DE</button>
      <button class="btn" data-set-lang="en">EN</button>
      <button class="btn" data-toggle-theme>Theme</button>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h1 data-i18n="title">Partner-Passwort zurücksetzen</h1>
      <p class="muted" data-i18n="sub">Lege ein neues Passwort für dein Partnerkonto fest.</p>
      <form id="resetForm" novalidate>
        <label>
          <span data-i18n="new_password">Neues Passwort</span>
          <input id="newPassword" type="password" minlength="8" required placeholder="New password (min. 8 chars)" />
        </label>
        <label>
          <span data-i18n="confirm_password">Neues Passwort bestätigen</span>
          <input id="confirmPassword" type="password" minlength="8" required placeholder="Confirm new password" />
        </label>
        <button type="submit" class="submit" data-i18n="submit">Passwort zurücksetzen</button>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <p class="muted" style="margin-top:12px;"><a href="partner-login.html" data-i18n="back_link">Zurück zum Partner-Login</a></p>
    </section>
  </main>

  <script src="partner-api.js"></script>
  <script>
    const LANG_KEY = 'bcsentinel-lang';
    const THEME_KEY = 'bcsentinel-theme';
    const html = document.documentElement;
    const tr = {
      de: { title:'Partner-Passwort zurücksetzen', sub:'Lege ein neues Passwort für dein Partnerkonto fest.', new_password:'Neues Passwort', confirm_password:'Neues Passwort bestätigen', submit:'Passwort zurücksetzen', back_link:'Zurück zum Partner-Login', missing_token:'Reset-Token fehlt in der URL.', short_pw:'Das Passwort muss mindestens 8 Zeichen haben.', mismatch:'Die Passwörter stimmen nicht überein.', success:'Passwort erfolgreich zurückgesetzt. Weiterleitung zum Login ...', failed:'Reset fehlgeschlagen. Der Link ist möglicherweise ungültig oder abgelaufen.' },
      en: { title:'Partner password reset', sub:'Set a new password for your partner account.', new_password:'New password', confirm_password:'Confirm new password', submit:'Reset password', back_link:'Back to partner login', missing_token:'Reset token missing in URL.', short_pw:'Password must have at least 8 characters.', mismatch:'Passwords do not match.', success:'Password reset successful. Redirecting to login ...', failed:'Reset failed. The link may be invalid or expired.' }
    };
    function lang(){ try { return localStorage.getItem(LANG_KEY)==='en' ? 'en' : 'de'; } catch(e){ return 'de'; } }
    function t(key){ return tr[lang()][key] || key; }
    function applyI18n(){ html.lang = lang(); document.querySelectorAll('[data-i18n]').forEach((el)=>{ const key=el.getAttribute('data-i18n'); if (tr[lang()][key]) el.textContent = tr[lang()][key]; }); document.title = lang()==='de' ? 'Partner-Passwort zurücksetzen | BCSentinel' : 'Partner password reset | BCSentinel'; }
    function setTheme(theme){ const selected = theme === 'light' ? 'light' : 'dark'; html.setAttribute('data-theme', selected); localStorage.setItem(THEME_KEY, selected); }
    function showStatus(type, message){ const box=document.getElementById('status'); box.className='status show '+type; box.textContent=message; }
    document.addEventListener('click', (event)=>{ const langBtn=event.target.closest('[data-set-lang]'); if (langBtn) { localStorage.setItem(LANG_KEY, langBtn.getAttribute('data-set-lang')); applyI18n(); } if (event.target.closest('[data-toggle-theme]')) { const current = html.getAttribute('data-theme') === 'light' ? 'light' : 'dark'; setTheme(current === 'light' ? 'dark' : 'light'); } });
    document.getElementById('resetForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const params = new URLSearchParams(window.location.search);
      const token = (params.get('token') || '').trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (!token) { showStatus('error', t('missing_token')); return; }
      if (!newPassword || newPassword.length < 8) { showStatus('error', t('short_pw')); return; }
      if (newPassword !== confirmPassword) { showStatus('error', t('mismatch')); return; }
      try {
        const response = await fetch(window.BCSentinelPartnerApi.buildUrl('/api/partners/auth/reset/confirm'), { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ token, new_password: newPassword }) });
        if (!response.ok) throw new Error('failed');
        showStatus('success', t('success'));
        setTimeout(() => { window.location.href = 'partner-login.html'; }, 900);
      } catch {
        showStatus('error', t('failed'));
      }
    });
    setTheme((localStorage.getItem(THEME_KEY)==='light' || localStorage.getItem(THEME_KEY)==='dark') ? localStorage.getItem(THEME_KEY) : 'dark');
    applyI18n();
  </script>
</body>
</html>
