<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Password Reset | BCSentinel</title>
  <style>
    :root {
      --bg: #08111f;
      --card: rgba(14, 26, 51, 0.82);
      --line: rgba(255,255,255,.1);
      --text: #eff4ff;
      --muted: #acbbd8;
      --orange: #ff8f3d;
      --shadow: 0 24px 80px rgba(0,0,0,.34);
    }
    html[data-theme="light"] {
      --bg: #f4f8ff;
      --card: rgba(255,255,255,.95);
      --line: rgba(12,33,66,.1);
      --text: #10213d;
      --muted: #566787;
      --shadow: 0 24px 70px rgba(21,43,82,.12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .container { width: min(calc(100% - 32px), 760px); margin: 32px auto; }
    .panel { border: 1px solid var(--line); border-radius: 18px; background: var(--card); box-shadow: var(--shadow); padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    .muted { color: var(--muted); }
    form { display: grid; gap: 12px; margin-top: 16px; }
    input { min-height: 46px; border: 1px solid var(--line); border-radius: 12px; padding: 0 12px; background: rgba(255,255,255,.03); color: var(--text); }
    button { min-height: 46px; border-radius: 12px; border: 1px solid var(--orange); background: linear-gradient(135deg, var(--orange), #ff7618); color: #fff; font-weight: 700; cursor: pointer; }
    .status { display: none; margin-top: 12px; padding: 12px; border-radius: 12px; }
    .status.show { display: block; }
    .status.error { background: rgba(226,87,76,.16); border: 1px solid rgba(226,87,76,.32); }
    .status.success { background: rgba(20,184,133,.14); border: 1px solid rgba(20,184,133,.3); }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel">
      <h1>Partner Password Reset</h1>
      <p class="muted">Set a new password for your partner account.</p>
      <form id="resetForm" novalidate>
        <input id="newPassword" type="password" minlength="8" required placeholder="New password (min. 8 chars)" />
        <input id="confirmPassword" type="password" minlength="8" required placeholder="Confirm new password" />
        <button type="submit">Reset Password</button>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <p class="muted" style="margin-top:12px;"><a href="partner-login.html">Back to partner login</a></p>
    </section>
  </main>

  <script src="partner-api.js"></script>
  <script>
    function showStatus(type, message) {
      const box = document.getElementById("status");
      box.className = "status show " + type;
      box.textContent = message;
    }

    document.getElementById("resetForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const params = new URLSearchParams(window.location.search);
      const token = (params.get("token") || "").trim();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!token) {
        showStatus("error", "Reset token missing in URL.");
        return;
      }
      if (!newPassword || newPassword.length < 8) {
        showStatus("error", "Password must have at least 8 characters.");
        return;
      }
      if (newPassword !== confirmPassword) {
        showStatus("error", "Passwords do not match.");
        return;
      }

      try {
        const response = await fetch(window.BCSentinelPartnerApi.buildUrl("/api/partners/auth/reset/confirm"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: newPassword })
        });
        if (!response.ok) throw new Error("failed");
        showStatus("success", "Password reset successful. Redirecting to login...");
        setTimeout(() => { window.location.href = "partner-login.html"; }, 900);
      } catch {
        showStatus("error", "Reset failed. Link may be invalid or expired.");
      }
    });
  </script>
</body>
</html>
