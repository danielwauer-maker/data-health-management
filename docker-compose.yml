services:
  backend:
    build: ./backend
    container_name: dhm-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://dhm:G7m9Xk4pQ2n8R5vL1zH6cD3w@postgres:5432/dhm
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: G7m9Xk4pQ2n8R5vL1zH6cD4w
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:15
    container_name: dhm-postgres
    environment:
      POSTGRES_DB: dhm
      POSTGRES_USER: dhm
      POSTGRES_PASSWORD: G7m9Xk4pQ2n8R5vL1zH6cD3w
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhm -d dhm"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - dhm_postgres_data:/var/lib/postgresql/data

volumes:
  dhm_postgres_data: